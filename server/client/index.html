<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Chat</title>

    <!-- IMPORTANT: CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <!-- Sidebar -->
      <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <h2>Chats</h2>
          <button
            id="createGroupBtn"
            class="create-group-btn"
            title="Create Group"
          >
            + Group
          </button>
        </div>
        <input id="userSearch" type="text" placeholder="Search users..." />
        <div id="usersList"></div>

        <div id="myProfile" class="my-profile">
          <img id="myAvatar" src="" alt="Your Avatar" />
          <span id="myName"></span>
        </div>
      </div>

      <!-- Chat Window -->
      <div class="chat-window">
        <!-- CHAT HEADER -->
        <div id="chatHeader" class="chat-header">
          <img
            id="chatAvatar"
            src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
          />
          <div class="chat-header-info">
            <span id="chatUserName">Select a chat</span>
            <span id="chatUserCount" class="chat-count"></span>
          </div>
          <div id="groupActions" class="group-actions" style="display: none">
            <button id="manageGroupBtn" class="manage-btn" title="Manage Group">
              ⚙️
            </button>
          </div>
        </div>

        <!-- MESSAGES -->
        <div id="messages" class="messages"></div>

        <!-- INPUT BOX -->
        <div class="input-box">
          <input type="text" id="msgInput" placeholder="Type a message..." />
          <button id="sendBtn">Send</button>
        </div>
      </div>

      <!-- END chat-window -->
    </div>
    <!-- END container -->

    <!-- Profile Modal -->
    <div id="profileModal" class="modal">
      <div class="modal-content profile-modal-content">
        <span class="close-btn" id="closeProfileModal">✕</span>

        <div class="profile-modal-body">
          <img id="profileModalAvatar" src="" alt="Avatar" />
          <h2 id="profileModalFullName"></h2>
          <p id="profileModalUsername"></p>
          <p id="profileModalEmail"></p>
        </div>
      </div>
    </div>

    <!-- Create Group Modal -->
    <div id="createGroupModal" class="modal">
      <div class="modal-content">
        <span class="close-btn" id="closeGroupModal">✕</span>

        <h2>Create Group Chat</h2>

        <div>
          <label>Group Name</label>
          <input type="text" id="groupName" placeholder="Enter group name" />
        </div>

        <div>
          <label>Select Members (at least 2)</label>
          <input
            type="text"
            id="groupSearch"
            placeholder="Search users to add..."
          />
        </div>

        <div>
          <label>Selected Members:</label>
          <div class="selected-members" id="selectedMembers"></div>
        </div>

        <button class="create-group-submit" id="createGroupSubmit">
          Create Group
        </button>
      </div>
    </div>

    <!-- Manage Group Modal -->
    <div id="manageGroupModal" class="modal">
      <div class="modal-content manage-group-content">
        <span class="close-btn" id="closeManageGroupModal">✕</span>

        <!-- GROUP HEADER -->
        <div class="group-header-section">
          <div class="group-avatar-wrapper">
            <img id="manageGroupAvatar" src="" />
            <label for="groupAvatarInput" class="edit-avatar-btn">✏️</label>
            <input type="file" id="groupAvatarInput" accept="image/*" hidden />
          </div>

          <h2 id="manageGroupTitle"></h2>
        </div>

        <!-- MEMBERS -->
        <div class="group-members-section">
          <h3>Group Members</h3>
          <div id="groupMembersList" class="group-members-list"></div>
        </div>

        <!-- ADD MEMBER -->
        <div class="add-member-section">
          <button id="openAddMemberBtn" class="add-member-btn">
            ➕ Add New Member
          </button>

          <div id="addMemberContainer" style="display: none">
            <input
              type="text"
              id="addMemberSearch"
              placeholder="Search users to add..."
            />
            <div id="addMemberResults"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- IMPORTANT: JS -->
    <script src="/socket.io/socket.io.js"></script>
    <!-- <script src="js/api.js"></script> -->
    <script src="js/script.js"></script>
  </body>
</html>
